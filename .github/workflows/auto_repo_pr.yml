name: Repo Automation + External PR

on:
  schedule:
    - cron: "0 */4 * * *"  # Runs every 4 hours
  workflow_dispatch:

jobs:
  automation:
    runs-on: ubuntu-latest

    steps:
      # ----------------------------
      # 0️⃣ Set environment variables
      # ----------------------------
      - name: Set Variables
        run: |
          echo "EXTERNAL_REPO_NAME=super-duper-meme" >> $GITHUB_ENV
          echo "EXTERNAL_REPO_OWNER=vamansworld786-arch" >> $GITHUB_ENV   # Replace with actual owner username
          export MY_TOKEN=${{ secrets.MY_TOKEN }}
          export COLLAB_TOKEN=${{ secrets.COLLAB_TOKEN }}

      # ----------------------------
      # 1️⃣ Create and star 30 repos
      # ----------------------------
      - name: Create and update 30 repositories
        run: |
          for i in $(seq 1 30); do
            REPO_NAME="repo-$(date +%s)-$i"

            # Create repo
            curl -X POST https://api.github.com/user/repos \
              -H "Authorization: token $MY_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -d "{\"name\":\"$REPO_NAME\",\"private\":false,\"auto_init\":true}"

            # Star repo
            curl -X PUT https://api.github.com/user/starred/vamansworld786-arch/$REPO_NAME \
              -H "Authorization: token $MY_TOKEN" \
              -H "Accept: application/vnd.github+json"

            # Clone, commit, push
            git clone https://$MY_TOKEN@github.com/vamansworld786-arch/$REPO_NAME.git
            cd $REPO_NAME
            git config user.name "Dippp10"
            git config user.email "deepikakarthik697@gmail.com"
            git checkout -b update-branch
            echo "Automated update $(date)" >> update.txt
            git add .
            git commit -m "Automated commit"
            git remote set-url origin https://$MY_TOKEN@github.com/vamansworld786-arch/$REPO_NAME.git
            git push origin update-branch
            cd ..
            rm -rf $REPO_NAME
            sleep 2
          done

      # ----------------------------
      # 2️⃣ Update external repo
      # ----------------------------
      - name: Clone and update external repo
        run: |
          git clone https://$COLLAB_TOKEN@github.com/$EXTERNAL_REPO_OWNER/$EXTERNAL_REPO_NAME.git
          cd $EXTERNAL_REPO_NAME
          git checkout -b update-branch
          echo "Automated update $(date)" >> update.txt
          git config user.name "Dippp10"
          git config user.email "deepikakarthik697@gmail.com"
          git add .
          git commit -m "Automated update"
          git remote set-url origin https://$COLLAB_TOKEN@github.com/$EXTERNAL_REPO_OWNER/$EXTERNAL_REPO_NAME.git
          git push origin update-branch

      # ----------------------------
      # 3️⃣ Create PR and merge external repo
      # ----------------------------
      - name: Install GitHub CLI
        run: sudo apt-get update && sudo apt-get install gh -y

      - name: Authenticate GitHub CLI
        run: echo "$COLLAB_TOKEN" | gh auth login --with-token

      - name: Create Pull Request on External Repo
        run: |
          gh pr create \
          --repo $EXTERNAL_REPO_OWNER/$EXTERNAL_REPO_NAME \
          --title "Automated PR" \
          --body "This PR is auto-generated by workflow" \
          --base main \
          --head update-branch

      - name: Merge Pull Request on External Repo
        run: |
          gh pr merge --repo $EXTERNAL_REPO_OWNER/$EXTERNAL_REPO_NAME --merge --admin --delete-branch
